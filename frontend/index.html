    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, Discord) -->

    <meta property="og:site_name" content="plinths" />

    <!-- Resolves theme before first paint to prevent flash of wrong theme -->
    <script>
      (function(){var t=localStorage.getItem('plinths-theme')||'system';if(t==='dark')t='stealth';var d=t==='system'?(window.matchMedia('(prefers-color-scheme: dark)').matches?'stealth':'light'):t;document.documentElement.setAttribute('data-theme',d);})();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
