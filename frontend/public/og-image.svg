<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Warm parchment background -->
  <rect width="1200" height="630" fill="#f0ede7"/>

  <!-- Subtle paper texture suggestion via a faint horizontal line -->
  <line x1="80" y1="84" x2="1120" y2="84" stroke="#1a1814" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="80" y1="546" x2="1120" y2="546" stroke="#1a1814" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top eyebrow: small uppercase mono label, like a private brief header -->
  <text x="80" y="64"
        font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="12" font-weight="600" letter-spacing="2.4"
        fill="#1a1814" fill-opacity="0.55">
    PLINTHS · AI MARKET INTELLIGENCE
  </text>

  <!-- Pyramid mark (scaled from 36x36 viewBox to ~144px) -->
  <g transform="translate(80, 215) scale(4)">
    <rect x="0"  y="28" width="36" height="6" rx="1.5" fill="#c9965a"/>
    <rect x="4"  y="19" width="28" height="6" rx="1.5" fill="#c9965a" opacity="0.85"/>
    <rect x="9"  y="10" width="18" height="6" rx="1.5" fill="#c9965a" opacity="0.65"/>
    <rect x="14" y="1"  width="8"  height="6" rx="1.5" fill="#c9965a" opacity="0.45"/>
  </g>

  <!-- Wordmark + tagline, set to the right of the mark -->
  <text x="270" y="320"
        font-family="'IBM Plex Serif', Georgia, 'Times New Roman', serif"
        font-size="116" font-weight="500" letter-spacing="-3"
        fill="#1a1814">plinths</text>

  <text x="272" y="368"
        font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="400" letter-spacing="0.2"
        fill="#1a1814" fill-opacity="0.62">
    The brief, calmly delivered.
  </text>

  <!-- Bottom slug: domain right-aligned, brief signature left -->
  <text x="80" y="566"
        font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="11" font-weight="500" letter-spacing="1.6"
        fill="#1a1814" fill-opacity="0.45">
    01 · COMPETITIVE LANDSCAPE · 8 COMPANIES IDENTIFIED
  </text>

  <text x="1120" y="566"
        font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="11" font-weight="500" letter-spacing="1.6"
        fill="#1a1814" fill-opacity="0.45"
        text-anchor="end">
    PLINTHS.NET
  </text>
</svg>
