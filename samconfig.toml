version = 0.1

[default.deploy.parameters]
stack_name = "marketlens-dev"
resolve_s3 = true
s3_prefix = "marketlens-dev"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
# Secrets must be passed at deploy time — never commit them here.
# Deploy with:
#   sam deploy --parameter-overrides \
#     "ApiKeyValue=$ML_API_KEY" \
#     "SenderEmail=$ML_SENDER_EMAIL" \
#     "GoogleClientId=$ML_GOOGLE_CLIENT_ID" \
#     "GoogleClientSecret=$ML_GOOGLE_CLIENT_SECRET"
#
# Or set them in environment variables and use:
#   sam deploy --parameter-overrides \
#     "ApiKeyValue=$(aws ssm get-parameter --name /marketlens/dev/api-key --with-decryption --query Parameter.Value --output text)"
parameter_overrides = "Stage=\"dev\" GoogleClientId=\"placeholder-not-configured\" GoogleClientSecret=\"placeholder-not-configured\" CognitoCallbackDomain=\"plinths.net\""
image_repositories = []

[default.global.parameters]
region = "us-east-1"
