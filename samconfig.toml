version = 0.1

[default.deploy.parameters]
stack_name = "marketlens-dev"
# Pinned bucket (do NOT use resolve_s3): with resolve_s3, SAM probes/mutates
# the `aws-sam-cli-managed-default` bootstrap stack on every deploy. The CD
# role is scoped to `marketlens-*` stacks only and can't touch that bootstrap
# stack. Pinning the existing bucket bypasses the probe entirely.
s3_bucket = "aws-sam-cli-managed-default-samclisourcebucket-di1ofvurqhdg"
s3_prefix = "marketlens-dev"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
# IMPORTANT — secret parameters are NOT listed here.
#
# `{{resolve:ssm-secure:...}}` dynamic references are NOT supported for
# Cognito's UserPoolIdentityProvider client_id/client_secret (CloudFormation
# rejects the changeset). So Google credentials cannot be auto-resolved in
# this template.
#
# By omitting GoogleClientId / GoogleClientSecret here, a bare `sam deploy`
# leaves the existing CloudFormation parameter values in place — fail-safe
# against the placeholder-clobber bug. Same for ApiKeyValue / SenderEmail.
#
# For FRESH deploys (or when a secret rotates), use the wrapper:
#   bin/deploy
# which fetches the current SSM values and passes them via
# `--parameter-overrides`.
parameter_overrides = "Stage=\"dev\" CognitoCallbackDomain=\"plinths.net\""
image_repositories = []

[default.global.parameters]
region = "us-east-1"
