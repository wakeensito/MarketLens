version = 0.1

[default.deploy.parameters]
stack_name = "marketlens-dev"
resolve_s3 = true
s3_prefix = "marketlens-dev"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
# ApiKeyValue is intentionally omitted — pass it at deploy time:
#   sam deploy --parameter-overrides "Stage=dev ApiKeyValue=<your-key>"
# Generate a key with: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
parameter_overrides = "Stage=\"dev\""
image_repositories = []

[default.global.parameters]
region = "us-east-1"
