AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MarketLens - AI-powered market intelligence platform

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment stage
  ApiKeyValue:
    Type: String
    NoEcho: true
    Description: API key for gateway authentication (injected by CloudFront, never exposed to browser)
    MinLength: 20
    MaxLength: 128
  BedrockModelIdParse:
    Type: String
    Default: amazon.nova-micro-v1:0
    Description: Bedrock model for Parse + Search structuring — Amazon Nova Micro (cheap extraction; not Nova 2 Lite)
  BedrockModelIdAnalyse:
    Type: String
    Default: deepseek.v3.2
    Description: Bedrock model for Analyse stage (reasoning) — DeepSeek V3.2
  BedrockModelIdSummarise:
    Type: String
    Default: amazon.nova-2-lite-v1:0
    Description: Bedrock model for Summarise stage (narrative) — Amazon Nova 2 Lite (replaces Claude 3 Haiku)
  BedrockModelIdMuseChat:
    Type: String
    Default: us.amazon.nova-2-lite-v1:0
    Description: Bedrock inference profile for Muse chat (Pro tier). Nova 2 Lite is NOT invokable on-demand by bare FM ID — it requires a cross-region inference profile (us.* prefix). Same Nova family as Summarise; kept separate so the chat experience can be tuned independently.
  GoogleClientId:
    Type: String
    NoEcho: true
    Description: Google OAuth2 client ID
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth2 client secret
  CognitoCallbackDomain:
    Type: String
    Default: "localhost"
    Description: >-
      CloudFront domain for Cognito callback URLs (e.g. d111111abcdef8.cloudfront.net).
      First deploy: leave as default. After deploy, copy CloudFrontDomainName from
      stack outputs, set this parameter, and redeploy.
  SenderEmail:
    Type: String
    Description: >-
      Verified SES email address for sending OTP codes (e.g. noreply@yourdomain.com).
      Must be verified in SES before deploy. In SES sandbox, recipient must also be verified.
  LwaLayerVersion:
    Type: Number
    Default: 27
    Description: >-
      AWS Lambda Web Adapter (us-east-1, x86_64) layer version. AWS Labs
      occasionally retires old LWA layer versions; bumping this parameter
      lets us swap without a code change. Source:
      https://github.com/awslabs/aws-lambda-web-adapter.

Globals:
  Function:
    MemorySize: 512
    Runtime: python3.13
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        REPORTS_TABLE: !Ref ReportsTable
        POWERTOOLS_SERVICE_NAME: MarketLens
        POWERTOOLS_METRICS_NAMESPACE: MarketLens
    Layers:
      - !Sub arn:aws:lambda:${AWS::Region}:017000801446:layer:AWSLambdaPowertoolsPythonV3-python313-x86_64:18
  Api:
    TracingEnabled: true

Resources:
  # ─── Cognito: User Pool + Identity Providers ───
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub marketlens-users-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      # MFA is OFF — authentication is handled by custom challenge (email OTP).
      # The OTP itself serves as the second factor (possession of email).
      MfaConfiguration: "OFF"
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          # Password is set to a random value on signup (user never sees it).
          # Custom auth flow bypasses password entirely.
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      DeviceConfiguration:
        ChallengeRequiredOnNewDevice: false
        DeviceOnlyRememberedOnUserPrompt: true
      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT
      LambdaConfig:
        DefineAuthChallenge: !GetAtt AuthDefineFunction.Arn
        CreateAuthChallenge: !GetAtt AuthCreateFunction.Arn
        VerifyAuthChallengeResponse: !GetAtt AuthVerifyFunction.Arn

  # Cognito domain managed outside CloudFormation — see deploy instructions
  # Domain: auth.plinths.net (custom domain with ACM cert)

  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email
        name: name
        username: sub

  # GitHub SSO requires a Lambda-backed OIDC proxy because GitHub does not
  # expose a standard OIDC issuer for user login. Deferred to post-beta.
  # See docs/planning/BACKLOG.md for implementation plan.

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - GoogleIdentityProvider
    Properties:
      ClientName: !Sub marketlens-app-${Stage}
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      # Callback/logout URLs use the CognitoCallbackDomain parameter.
      # First deploy uses "localhost" (placeholder). After deploy, set the
      # parameter to the real CloudFront domain and redeploy.
      CallbackURLs:
        - !Sub "https://${CognitoCallbackDomain}/auth/callback"
      LogoutURLs:
        - !Sub "https://${CognitoCallbackDomain}/"
      SupportedIdentityProviders:
        - Google
      ExplicitAuthFlows:
        - ALLOW_CUSTOM_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED

  # ─── S3: Frontend Hosting ───
  WebUIBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub marketlens-frontend-${Stage}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  WebUIBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebUIBucket
      PolicyDocument:
        Statement:
          - Sid: HttpsOnly
            Action: "*"
            Effect: Deny
            Resource:
              - !Sub arn:${AWS::Partition}:s3:::${WebUIBucket}
              - !Sub arn:${AWS::Partition}:s3:::${WebUIBucket}/*
            Principal: "*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
          - Sid: CloudFrontOriginOnly
            Action: s3:GetObject
            Effect: Allow
            Resource: !Sub arn:${AWS::Partition}:s3:::${WebUIBucket}/*
            Principal:
              Service: "cloudfront.amazonaws.com"
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ─── CloudFront ───
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub marketlens-oac-${Stage}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub marketlens-security-headers-${Stage}
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Override: true
            Preload: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          XSSProtection:
            ModeBlock: true
            Override: true
            Protection: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  # Cookie forwarding policy for /api/* and /auth/* paths
  CookieForwardingCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub marketlens-cookie-cache-${Stage}
        DefaultTTL: 0
        MaxTTL: 0
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingGzip: false

  CookieForwardingOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub marketlens-cookie-origin-${Stage}
        CookiesConfig:
          CookieBehavior: whitelist
          Cookies:
            - ml_access
            - ml_refresh
            - ml_logged_in
            - ml_oauth_state
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Accept
            - Content-Type
            - Origin
            - Referer
        QueryStringsConfig:
          QueryStringBehavior: all

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3
            DomainName: !GetAtt WebUIBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}
          - Id: api
            DomainName: !Sub "${ApiGatewayApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: !Sub "/${Stage}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: x-api-key
                HeaderValue: !Ref ApiKeyValue
          - Id: muse-stream
            # FunctionUrl returns `https://<id>.lambda-url.<region>.on.aws/`.
            # Strip the scheme + trailing slash so CloudFront sees just the host.
            DomainName: !Select [2, !Split ["/", !GetAtt MuseStreamFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref MuseStreamLambdaOAC
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        Aliases:
          - plinths.net
        ViewerCertificate:
          AcmCertificateArn: arn:aws:acm:us-east-1:562559071105:certificate/c1e3758e-5666-4b68-af80-ec658ce11bd4
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            Cookies:
              Forward: none
            QueryString: true
          TargetOriginId: S3
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
        CacheBehaviors:
          # /auth/* — BFF auth endpoints (cookie forwarding, no caching)
          - AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [HEAD, GET, OPTIONS]
            Compress: false
            PathPattern: "/auth/*"
            TargetOriginId: api
            CachePolicyId: !Ref CookieForwardingCachePolicy
            OriginRequestPolicyId: !Ref CookieForwardingOriginRequestPolicy
            ViewerProtocolPolicy: redirect-to-https
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          # /api/muse/stream* — SSE streaming endpoint. Routes to a Lambda
          # Function URL (RESPONSE_STREAM) wrapped by AWS Lambda Web Adapter
          # so a Python ASGI app (Starlette + sse-starlette) can serve native
          # Server-Sent Events. The OAC SigV4-signs requests; the Function
          # URL's AWS_IAM auth rejects anything that doesn't carry that
          # signature. CloudFront routes by path-pattern *specificity* (longest
          # prefix wins), not array order — this pattern wins over /api/*
          # because it's more specific, regardless of position.
          - AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [HEAD, GET, OPTIONS]
            Compress: false
            PathPattern: "/api/muse/stream*"
            TargetOriginId: muse-stream
            CachePolicyId: !Ref CookieForwardingCachePolicy
            # Shares CookieForwardingOriginRequestPolicy (forwards the ml_access
            # cookie for in-Lambda auth). The x-amz-content-sha256 body hash the
            # browser sends is NOT forwarded via this policy — CloudFront's OAC
            # signing consumes it automatically and CloudFront rejects that
            # header inside an OriginRequestPolicy, so it must not be listed.
            OriginRequestPolicyId: !Ref CookieForwardingOriginRequestPolicy
            ViewerProtocolPolicy: redirect-to-https
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          # /api/* — API endpoints (cookie forwarding for auth)
          - AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [HEAD, GET, OPTIONS]
            Compress: false
            PathPattern: "/api/*"
            TargetOriginId: api
            CachePolicyId: !Ref CookieForwardingCachePolicy
            OriginRequestPolicyId: !Ref CookieForwardingOriginRequestPolicy
            ViewerProtocolPolicy: redirect-to-https
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ─── API Gateway ───
  ApiGatewayApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Auth:
        ApiKeyRequired: true
        DefaultAuthorizer: CookieAuthorizer
        Authorizers:
          CookieAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - Cookie
              ReauthorizeEvery: 300
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGWLogGroup.Arn
        Format: "$context.identity.sourceIp $context.requestTime $context.httpMethod $context.resourcePath $context.protocol $context.status $context.responseLength $context.requestId $context.identity.apiKeyId"
      Cors:
        AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
        AllowHeaders: "'Content-Type,X-Amz-Date,X-Amz-Security-Token,Authorization,X-Api-Key,X-Requested-With,Accept,Cookie'"
        # CORS origin is enforced by CloudFront; API Gateway uses permissive origin
        # to avoid circular dependency (CF domain not known at API creation time).
        # The API key + cookie auth provide the real access control.
        AllowOrigin: "'*'"
        AllowCredentials: false

  # API key with explicit value so CloudFront can inject it as an origin header.
  # The key never reaches the browser — CloudFront adds it server-side.
  MarketLensApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub marketlens-cf-key-${Stage}
      Description: API key injected by CloudFront origin header (never exposed to browser)
      Enabled: true
      Value: !Ref ApiKeyValue
      StageKeys:
        - RestApiId: !Ref ApiGatewayApi
          StageName: !Ref Stage

  MarketLensUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub marketlens-plan-${Stage}
      Description: !Sub "MarketLens ${Stage} — rate limits and quotas"
      ApiStages:
        - ApiId: !Ref ApiGatewayApi
          Stage: !Ref Stage
      Throttle:
        BurstLimit: 20
        RateLimit: 10
      Quota:
        Limit: 500
        Period: DAY

  MarketLensUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MarketLensApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MarketLensUsagePlan

  ApiGWLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/marketlens-${Stage}
      RetentionInDays: 90

  # ─── DynamoDB: Reports Table ───
  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub marketlens-reports-${Stage}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ─── DynamoDB: Muse Conversations Table ───
  MuseConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub marketlens-muse-conversations-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        # GSI1 reserved for Max-tier cross-report memory (out of scope in v1,
        # but provisioning the keys up front avoids a table rebuild later).
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # NEW_IMAGE is the only view the analytics forwarder needs — chat rows
      # are immutable post-write so OLD_IMAGE has no analytical value, and
      # KEYS_ONLY would force the forwarder to do a separate GetItem per row.
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  # ─── Muse analytics pipeline ───
  # DynamoDB Stream → Forwarder Lambda → Firehose (JSON→Parquet) → S3 → Athena.
  # See docs/muse/MUSE-ANALYTICS-PIPELINE.md for architecture, schema, runbook, and
  # query examples. Resources below are ordered: bucket → DLQ → Glue catalog →
  # Firehose role → Firehose stream → forwarder Lambda.

  MuseAnalyticsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub marketlens-muse-raw-${Stage}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          # Raw chat-row Parquet: keep a year for trend analysis, then expire.
          # Adjust if compliance requires longer retention.
          - Id: ExpireOldParquet
            Status: Enabled
            Prefix: muse/raw/
            ExpirationInDays: 365
          # Firehose error records — keep 90 days so a backlog of malformed
          # rows is debuggable but doesn't accumulate forever.
          - Id: ExpireFirehoseErrors
            Status: Enabled
            Prefix: muse/errors/
            ExpirationInDays: 90

  MuseForwarderDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub plinths-muse-forwarder-dlq-${Stage}
      # 14-day retention gives ample window to alarm + investigate before the
      # failure record itself expires. The underlying DDB Stream events are
      # only retained 24h though, so replay must happen within that window.
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  MuseAnalyticsGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub plinths_muse_${Stage}
        Description: Muse chat analytics — Parquet rows landed by Firehose

  MuseAnalyticsGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref MuseAnalyticsGlueDatabase
      TableInput:
        Name: muse_messages
        Description: One row per chat message (user or assistant), Parquet via Firehose
        TableType: EXTERNAL_TABLE
        # Partition projection keeps Athena from needing MSCK REPAIR or
        # explicit partition registration as new days roll over.
        Parameters:
          classification: parquet
          "projection.enabled": "true"
          "projection.dt.type": "date"
          "projection.dt.format": "yyyy-MM-dd"
          "projection.dt.range": "2026-01-01,NOW"
          "projection.dt.interval": "1"
          "projection.dt.interval.unit": "DAYS"
          "storage.location.template": !Sub "s3://${MuseAnalyticsBucket}/muse/raw/dt=${!dt}/"
        PartitionKeys:
          - Name: dt
            Type: string
        StorageDescriptor:
          Location: !Sub s3://${MuseAnalyticsBucket}/muse/raw/
          InputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe
          Columns:
            - Name: report_id
              Type: string
            - Name: org_id
              Type: string
            - Name: conversation_id
              Type: string
            - Name: message_id
              Type: string
            - Name: role
              Type: string
            - Name: content
              Type: string
            - Name: created_at
              Type: string
            - Name: sources
              Type: array<struct<kind:string,target:string,label:string>>
            - Name: follow_ups
              Type: array<string>
            - Name: tokens_in
              Type: bigint
            - Name: tokens_out
              Type: bigint
            - Name: model_id
              Type: string

  # Firehose runs as its own service principal, so it needs its own role with
  # narrowly-scoped grants: write Parquet to the bucket, read the Glue table
  # for schema lookups, and write its own delivery logs.
  MuseAnalyticsFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub plinths-muse-firehose-${Stage}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref AWS::AccountId
      Policies:
        - PolicyName: WriteParquetToBucket
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt MuseAnalyticsBucket.Arn
                  - !Sub "${MuseAnalyticsBucket.Arn}/*"
        - PolicyName: ReadGlueSchema
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetTableVersion
                  - glue:GetTableVersions
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${MuseAnalyticsGlueDatabase}"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${MuseAnalyticsGlueDatabase}/${MuseAnalyticsGlueTable}"
        - PolicyName: WriteDeliveryLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesisfirehose/plinths-muse-${Stage}:log-stream:*"

  MuseAnalyticsFirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/kinesisfirehose/plinths-muse-${Stage}
      RetentionInDays: 90

  MuseAnalyticsFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub plinths-muse-${Stage}
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt MuseAnalyticsBucket.Arn
        RoleARN: !GetAtt MuseAnalyticsFirehoseRole.Arn
        # 64 MiB or 60s — whichever hits first. Larger buffers produce fewer,
        # bigger Parquet files which Athena scans faster, but delay arrival
        # in the lake. 60s is the sweet spot for chat: data is queryable
        # within a minute and files stay analytics-friendly.
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 64
        CompressionFormat: UNCOMPRESSED  # Parquet handles its own compression
        Prefix: "muse/raw/dt=!{timestamp:yyyy-MM-dd}/"
        ErrorOutputPrefix: "muse/errors/!{firehose:error-output-type}/dt=!{timestamp:yyyy-MM-dd}/"
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Sub /aws/kinesisfirehose/plinths-muse-${Stage}
          LogStreamName: S3Delivery
        DataFormatConversionConfiguration:
          Enabled: true
          SchemaConfiguration:
            CatalogId: !Ref AWS::AccountId
            DatabaseName: !Ref MuseAnalyticsGlueDatabase
            TableName: !Ref MuseAnalyticsGlueTable
            Region: !Ref AWS::Region
            RoleARN: !GetAtt MuseAnalyticsFirehoseRole.Arn
            VersionId: LATEST
          InputFormatConfiguration:
            Deserializer:
              OpenXJsonSerDe: {}
          OutputFormatConfiguration:
            Serializer:
              ParquetSerDe:
                Compression: SNAPPY

  # Lambda: Muse Analytics Forwarder (DDB Stream → Firehose).
  MuseForwarderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/muse-forwarder/
      Description: Forwards Muse chat rows from DynamoDB Streams to Firehose for Parquet analytics
      MemorySize: 256
      Timeout: 60
      # Override Globals to drop REPORTS_TABLE — this Lambda doesn't read
      # reports, only forwards conversation rows.
      Environment:
        Variables:
          FIREHOSE_STREAM_NAME: !Ref MuseAnalyticsFirehose
          POWERTOOLS_METRICS_NAMESPACE: PlinthsMuse
          POWERTOOLS_SERVICE_NAME: muse-forwarder
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - firehose:PutRecord
                - firehose:PutRecordBatch
              Resource: !GetAtt MuseAnalyticsFirehose.Arn
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt MuseForwarderDLQ.Arn
      Events:
        ConversationStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt MuseConversationsTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 5
            MaximumRetryAttempts: 3
            # On a function error, bisect the batch and retry — narrows down
            # which specific record(s) are bad before they hit the DLQ.
            BisectBatchOnFunctionError: true
            # Honor `batchItemFailures` from the handler so only the failed
            # records are retried, not the whole batch.
            FunctionResponseTypes:
              - ReportBatchItemFailures
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt MuseForwarderDLQ.Arn

  MuseForwarderFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${MuseForwarderFunction}
      RetentionInDays: 90

  # ─── Lambda Layer: shared cookie JWT verification ───
  # Used by the Authorizer Lambda (for API Gateway) and the Muse Stream Lambda
  # (behind a Function URL where API Gateway's authorizer is not in the path).
  # Bundles PyJWT + cryptography so consumers don't each pin their own copy.
  PlinthsAuthLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub plinths-auth-shared-${Stage}
      Description: Shared cookie JWT verification (plinths_auth) + PyJWT + cryptography
      ContentUri: infrastructure/layers/plinths-auth-shared/
      CompatibleRuntimes:
        - python3.13
      RetentionPolicy: Delete
    Metadata:
      # Custom build (Makefile target `build-PlinthsAuthLayer`) so the layer
      # zip contains BOTH the hand-written `plinths_auth` module from source
      # AND the pip-installed deps. The stock `python3.13` builder only does
      # pip install — it would publish a layer without `plinths_auth`, which
      # is what broke the authorizer prior to this change.
      BuildMethod: makefile

  # ─── Lambda: Cognito Auth Triggers (passwordless email OTP) ───
  AuthDefineFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/auth-define/
      Description: Cognito DefineAuthChallenge — controls custom auth flow
      MemorySize: 128
      Timeout: 5
      # Override Globals to remove REPORTS_TABLE dependency (not needed by triggers)
      Environment:
        Variables:
          STAGE: !Ref Stage
          POWERTOOLS_SERVICE_NAME: MarketLens
          POWERTOOLS_METRICS_NAMESPACE: MarketLens

  AuthDefineFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthDefineFunction}
      RetentionInDays: 90

  AuthDefinePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthDefineFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  AuthCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/auth-create/
      Description: Cognito CreateAuthChallenge — generates OTP and sends via SES
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          STAGE: !Ref Stage
          SENDER_EMAIL: !Ref SenderEmail
          POWERTOOLS_SERVICE_NAME: MarketLens
          POWERTOOLS_METRICS_NAMESPACE: MarketLens
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
              Condition:
                StringEquals:
                  "ses:FromAddress": !Ref SenderEmail

  AuthCreateFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthCreateFunction}
      RetentionInDays: 90

  AuthCreatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthCreateFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  AuthVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/auth-verify/
      Description: Cognito VerifyAuthChallengeResponse — checks OTP answer
      MemorySize: 128
      Timeout: 5
      Environment:
        Variables:
          STAGE: !Ref Stage
          POWERTOOLS_SERVICE_NAME: MarketLens
          POWERTOOLS_METRICS_NAMESPACE: MarketLens

  AuthVerifyFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthVerifyFunction}
      RetentionInDays: 90

  AuthVerifyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthVerifyFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  # ─── Lambda: BFF Auth ───
  BffAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/bff/
      Description: BFF auth endpoints — login, callback, refresh, logout, me
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:RevokeToken
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
                - cognito-idp:SignUp
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminConfirmSignUp
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/marketlens/${Stage}/cognito-client-secret
      Environment:
        Variables:
          COGNITO_DOMAIN: auth.plinths.net
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          # Secret is in SSM SecureString — not stored as a plaintext env var.
          # After first deploy, populate with:
          #   aws ssm put-parameter \
          #     --name /marketlens/<stage>/cognito-client-secret \
          #     --type SecureString \
          #     --value $(aws cognito-idp describe-user-pool-client \
          #                --user-pool-id <pool-id> --client-id <client-id> \
          #                --query UserPoolClient.ClientSecret --output text)
          COGNITO_CLIENT_SECRET_PARAM: !Sub /marketlens/${Stage}/cognito-client-secret
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          APP_DOMAIN: !Sub "https://${CognitoCallbackDomain}"
      Events:
        AuthAny:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY
            RestApiId: !Ref ApiGatewayApi
            Auth:
              ApiKeyRequired: true
              Authorizer: NONE

  BffAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${BffAuthFunction}
      RetentionInDays: 90

  # ─── Lambda: Authorizer ───
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/authorizer/
      Description: Cookie-based JWT authorizer — validates ml_access cookie
      MemorySize: 256
      Timeout: 10
      Layers:
        # Powertools layer comes from Globals.Function.Layers (SAM appends
        # function-level Layers to the global list).
        - !Ref PlinthsAuthLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReportsTable
      Environment:
        Variables:
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool

  AuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthorizerFunction}
      RetentionInDays: 90

  # ─── Lambda: Muse Sync (list + delete conversation thread) ───
  MuseSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sync.lambda_handler
      CodeUri: infrastructure/lambda/muse/
      Description: Muse sync routes — GET/DELETE /api/muse/conversations/{report_id}
      MemorySize: 256
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MuseConversationsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ReportsTable
      Environment:
        Variables:
          MUSE_CONVERSATIONS_TABLE: !Ref MuseConversationsTable
      Events:
        GetThread:
          Type: Api
          Properties:
            Path: /api/muse/conversations/{report_id}
            Method: GET
            RestApiId: !Ref ApiGatewayApi
        DeleteThread:
          Type: Api
          Properties:
            Path: /api/muse/conversations/{report_id}
            Method: DELETE
            RestApiId: !Ref ApiGatewayApi
        SetMessageFeedback:
          Type: Api
          Properties:
            Path: /api/muse/conversations/{report_id}/messages/{message_id}/feedback
            Method: POST
            RestApiId: !Ref ApiGatewayApi

  MuseSyncFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${MuseSyncFunction}
      RetentionInDays: 90

  # ─── Lambda: Muse Chat (SSE streaming via Lambda Function URL) ───
  # AWS Lambda Web Adapter wraps a Starlette + sse-starlette ASGI app so a
  # Python Lambda can serve native Server-Sent Events over a Function URL with
  # InvokeMode: RESPONSE_STREAM. CloudFront fronts the URL via OAC SigV4.
  MuseStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      # LWA entrypoint script; LWA runs it on cold start, then proxies HTTP
      # from the Function URL onto $AWS_LWA_PORT where uvicorn listens.
      Handler: run.sh
      CodeUri: infrastructure/lambda/muse/
      Description: Muse chat — Bedrock Nova 2 Lite streaming via LWA + Starlette
      MemorySize: 1024
      # Bedrock InvokeModelWithResponseStream can hold a single connection
      # while the model is generating. 120s caps the worst-case turn so the
      # CloudFront idle timeout and Lambda timeout both terminate the stream
      # rather than letting the browser hang.
      Timeout: 120
      Layers:
        # Powertools layer comes from Globals.Function.Layers (SAM appends
        # function-level Layers to the global list).
        - !Ref PlinthsAuthLayer
        # AWS Lambda Web Adapter — public layer published by AWS Labs.
        # Account 753240598075 is AWS-owned; the layer ARN is documented at
        # https://github.com/awslabs/aws-lambda-web-adapter. Version pinned
        # via the LwaLayerVersion stack parameter so it can be bumped
        # without a code change if AWS retires an old version.
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:${LwaLayerVersion}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MuseConversationsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ReportsTable
        # Free-tier daily counter writes to USER#{user_id} rows on the
        # Reports table. Scoped to UpdateItem on USER# partition keys only
        # — explicitly NOT broad CRUD so a bug here can't trash report rows.
        - Statement:
            - Effect: Allow
              Action: dynamodb:UpdateItem
              Resource: !GetAtt ReportsTable.Arn
              Condition:
                ForAllValues:StringLike:
                  dynamodb:LeadingKeys:
                    - "USER#*"
        - Statement:
            # Muse invokes Nova 2 Lite through a cross-region inference profile
            # (us.amazon.nova-2-lite-v1:0). Bedrock evaluates IAM against BOTH
            # the inference-profile ARN AND the underlying foundation-model ARNs
            # in every region the profile can route to (us-east-1/2, us-west-2).
            # Omitting the FM ARNs turns the ValidationException into AccessDenied.
            # The FM ARNs are hardcoded (not derived from the param) because the
            # param now holds a profile ID, not an FM ID.
            - Effect: Allow
              Action: bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelIdMuseChat}"
                - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-2-lite-v1:0"
                - "arn:aws:bedrock:us-east-2::foundation-model/amazon.nova-2-lite-v1:0"
                - "arn:aws:bedrock:us-west-2::foundation-model/amazon.nova-2-lite-v1:0"
      Environment:
        Variables:
          MUSE_CONVERSATIONS_TABLE: !Ref MuseConversationsTable
          CHAT_MODEL_ID: !Ref BedrockModelIdMuseChat
          # PlinthsAuthLayer reads these at module-import time to verify the
          # ml_access cookie (Function URLs bypass API Gateway's authorizer,
          # so the Lambda verifies the JWT itself).
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          # AWS Lambda Web Adapter configuration.
          # On a managed runtime, the LWA layer only takes over the invocation
          # when AWS_LAMBDA_EXEC_WRAPPER points at its bootstrap. Without this,
          # the native Python runtime treats `Handler: run.sh` as a module
          # import and fails cold start with
          # "Runtime.ImportModuleError: No module named 'run'".
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          AWS_LWA_PORT: "8080"
          PORT: "8080"
          # LWA polls this path on cold start before marking the app ready;
          # default is `/` which Starlette would 404 on. Point it at our
          # explicit `/health` route so readiness reflects the ASGI app, not
          # an accidental 404.
          AWS_LWA_READINESS_CHECK_PATH: /health
          POWERTOOLS_SERVICE_NAME: muse-stream

  MuseStreamFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${MuseStreamFunction}
      RetentionInDays: 90

  # CloudFront-to-Lambda OAC: SigV4-signs each origin request so the Function
  # URL's AWS_IAM auth rejects everything that doesn't carry the signature.
  MuseStreamLambdaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub plinths-muse-stream-oac-${Stage}
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  MuseStreamFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt MuseStreamFunction.Arn
      AuthType: AWS_IAM
      InvokeMode: RESPONSE_STREAM
      Cors:
        AllowOrigins:
          # Production domain only; the local-dev story is "hit the deployed
          # dev stack" (SAM local can't reproduce the Function URL + CloudFront
          # OAC topology anyway). On the first deploy this will be `localhost`
          # which means browser Origin headers from the real CloudFront domain
          # will fail CORS preflight — redeploy with the real domain set on
          # the CognitoCallbackDomain parameter before opening traffic.
          - !Sub "https://${CognitoCallbackDomain}"
        AllowMethods:
          - POST
        AllowHeaders:
          # `Cookie` is a CORS-forbidden request header per the Fetch spec —
          # listing it in Access-Control-Allow-Headers is a no-op (browsers
          # never put Cookie in a preflight Access-Control-Request-Headers).
          # The cookie still rides on the actual POST via `credentials:
          # 'include'` on the fetch + the cookie-forwarding origin request
          # policy on the CloudFront behavior.
          - Content-Type
        AllowCredentials: true
        MaxAge: 0

  MuseStreamFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt MuseStreamFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      FunctionUrlAuthType: AWS_IAM
      SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ─── Lambda: API ───
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/api/
      Description: REST API handler for MarketLens
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref AiOrchestrationFunction
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub ${AiOrchestrationFunction.Arn}:*
      Environment:
        Variables:
          AI_FUNCTION_NAME: !Sub ${AiOrchestrationFunction.Arn}:live
      Events:
        AnyPath:
          Type: Api
          Properties:
            Path: /api/{proxy+}
            Method: ANY
            RestApiId: !Ref ApiGatewayApi
        HealthCheck:
          Type: Api
          Properties:
            Path: /api/health
            Method: GET
            RestApiId: !Ref ApiGatewayApi
            Auth:
              ApiKeyRequired: false
              Authorizer: NONE

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiFunction}
      RetentionInDays: 90

  # ─── Lambda: AI Orchestration (Durable Function) ───
  AiOrchestrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: infrastructure/lambda/ai-orchestration/
      Description: AI analysis pipeline using Lambda Durable Functions
      MemorySize: 1024
      Timeout: 900
      DurableConfig:
        ExecutionTimeout: 3600
        RetentionPeriodInDays: 7
      AutoPublishAlias: live
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub arn:aws:s3:::marketlens-reports-raw-${Stage}/reports/raw/*
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:marketlens/${Stage}/*
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelIdParse}"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelIdAnalyse}"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelIdSummarise}"
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/marketlens/${Stage}/brave-search-api-key"
      Environment:
        Variables:
          BEDROCK_MODEL_ID_PARSE: !Ref BedrockModelIdParse
          BEDROCK_MODEL_ID_ANALYSE: !Ref BedrockModelIdAnalyse
          BEDROCK_MODEL_ID_SUMMARISE: !Ref BedrockModelIdSummarise
          BRAVE_SEARCH_API_KEY_PARAM: !Sub /marketlens/${Stage}/brave-search-api-key
          REPORTS_RAW_BUCKET: !Sub marketlens-reports-raw-${Stage}

  AiOrchestrationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AiOrchestrationFunction}
      RetentionInDays: 90

  # ─── Lambda: Export ───
  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/export/
      Description: PDF and CSV report export
      MemorySize: 1024
      Timeout: 120
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReportsTable
        - S3CrudPolicy:
            BucketName: !Ref ExportsBucket
      Environment:
        Variables:
          EXPORTS_BUCKET: !Ref ExportsBucket
      Events:
        ExportApi:
          Type: Api
          Properties:
            Path: /api/reports/{report_id}/export
            Method: POST
            RestApiId: !Ref ApiGatewayApi

  ExportFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ExportFunction}
      RetentionInDays: 90

  # ─── S3: Exports Bucket ───
  ExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub marketlens-exports-${Stage}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireExports
            Status: Enabled
            ExpirationInDays: 7

  # ─── S3: Reports Raw Bucket (for DataBrew analytics pipeline) ───
  # Bucket created manually: marketlens-reports-raw-${Stage}
  # Not managed by CloudFormation to avoid conflicts with existing bucket.
  # Example: marketlens-reports-raw-dev, marketlens-reports-raw-prod

  # ─── Lambda: Billing (Stripe) ───
  BillingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/billing/
      Description: Stripe billing — checkout, portal, webhooks
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - SSMParameterReadPolicy:
            ParameterName: !Sub marketlens/${Stage}/stripe-secret-key
        - SSMParameterReadPolicy:
            ParameterName: !Sub marketlens/${Stage}/stripe-webhook-secret
      Environment:
        Variables:
          APP_DOMAIN: !Sub https://${CognitoCallbackDomain}
          STRIPE_SECRET_KEY_PARAM: !Sub /marketlens/${Stage}/stripe-secret-key
          STRIPE_WEBHOOK_SECRET_PARAM: !Sub /marketlens/${Stage}/stripe-webhook-secret
          STRIPE_PRICE_ID_PRO: price_1TTWHWD0uRRrx9E75JuQHBZd
          STRIPE_PRICE_ID_MAX: price_1TTWHWD0uRRrx9E79aJXLXor
          STRIPE_PRICE_ID_PRO_ANNUAL: price_1TTX4LD0uRRrx9E7WSD0kaEV
          STRIPE_PRICE_ID_MAX_ANNUAL: price_1TTWHWD0uRRrx9E7EepKDTCp
      Events:
        BillingCheckout:
          Type: Api
          Properties:
            Path: /api/billing/checkout
            Method: POST
            RestApiId: !Ref ApiGatewayApi
        BillingPortal:
          Type: Api
          Properties:
            Path: /api/billing/portal
            Method: POST
            RestApiId: !Ref ApiGatewayApi
        BillingWebhook:
          Type: Api
          Properties:
            Path: /api/billing/webhook
            Method: POST
            RestApiId: !Ref ApiGatewayApi
            Auth:
              ApiKeyRequired: false
              Authorizer: NONE

  BillingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${BillingFunction}
      RetentionInDays: 90

  # ─── Lambda: Email Forwarder ───
  # FORWARD_TO_EMAIL_PARAM points at an SSM SecureString populated manually after deploy
  # (CloudFormation cannot write SecureString from a resource attribute).
  EmailForwarderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: infrastructure/lambda/email-forwarder/
      Description: Forwards incoming SES emails to a personal address (recipient stored in SSM)
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          FORWARD_TO_EMAIL_PARAM: !Sub /marketlens/${Stage}/forward-to-email
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: !Sub marketlens/${Stage}/forward-to-email
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: arn:aws:s3:::plinths-incoming-email/*
            - Effect: Allow
              Action:
                - ses:SendRawEmail
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/plinths.net
              Condition:
                StringEquals:
                  "ses:FromAddress": "info@plinths.net"

  EmailForwarderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${EmailForwarderFunction}
      RetentionInDays: 90

  # S3 trigger wired manually after deploy (bucket pre-exists, not managed by SAM)
  # aws s3api put-bucket-notification-configuration --bucket plinths-incoming-email ...

Outputs:
  WebUIBucketName:
    Description: S3 bucket for frontend assets
    Value: !Ref WebUIBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: CloudFront domain name
    Value: !GetAtt CloudFrontDistribution.DomainName

  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${ApiGatewayApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/api/"

  ReportsTableName:
    Description: DynamoDB reports table name
    Value: !Ref ReportsTable

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient

  CognitoDomain:
    Description: Cognito Hosted UI domain
    Value: auth.plinths.net

  ReportsRawBucketName:
    Description: S3 bucket for raw JSON reports (DataBrew input)
    Value: !Sub marketlens-reports-raw-${Stage}

  MuseConversationsTableName:
    Description: DynamoDB table for Muse per-report conversation threads
    Value: !Ref MuseConversationsTable

  MuseAnalyticsBucketName:
    Description: S3 bucket holding Parquet chat-message rows (queried by Athena)
    Value: !Ref MuseAnalyticsBucket

  MuseAnalyticsFirehoseName:
    Description: Firehose delivery stream that converts JSON → Parquet for chat analytics
    Value: !Ref MuseAnalyticsFirehose

  MuseAnalyticsGlueDatabaseName:
    Description: Glue Data Catalog database — point Athena at this database to query chat rows
    Value: !Ref MuseAnalyticsGlueDatabase

  MuseAnalyticsGlueTableName:
    Description: Glue Data Catalog table for muse_messages (Parquet, partitioned by dt)
    Value: !Ref MuseAnalyticsGlueTable

  MuseForwarderDLQUrl:
    Description: SQS DLQ for forwarder ESM failures — alarm on ApproximateNumberOfMessagesVisible > 0
    Value: !Ref MuseForwarderDLQ

  MuseStreamFunctionUrl:
    Description: Raw Lambda Function URL for the Muse SSE endpoint (debug only — browsers hit CloudFront, not this URL)
    Value: !GetAtt MuseStreamFunctionUrl.FunctionUrl
