AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MarketLens - AI-powered market intelligence platform

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment stage
  ApiKeyValue:
    Type: String
    NoEcho: true
    Description: API key for gateway authentication (injected by CloudFront, never exposed to browser)
    MinLength: 20
    MaxLength: 128
  BedrockModelIdParse:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model for Parse stage (structured extraction)
  BedrockModelIdAnalyse:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model for Analyse stage (reasoning)
  BedrockModelIdSummarise:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model for Summarise stage (narrative)
  GoogleClientId:
    Type: String
    NoEcho: true
    Description: Google OAuth2 client ID
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth2 client secret
  CognitoCallbackDomain:
    Type: String
    Default: "localhost"
    Description: >-
      CloudFront domain for Cognito callback URLs (e.g. d111111abcdef8.cloudfront.net).
      First deploy: leave as default. After deploy, copy CloudFrontDomainName from
      stack outputs, set this parameter, and redeploy.
  SenderEmail:
    Type: String
    Description: >-
      Verified SES email address for sending OTP codes (e.g. noreply@yourdomain.com).
      Must be verified in SES before deploy. In SES sandbox, recipient must also be verified.

Globals:
  Function:
    MemorySize: 512
    Runtime: python3.13
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        REPORTS_TABLE: !Ref ReportsTable
        POWERTOOLS_SERVICE_NAME: MarketLens
        POWERTOOLS_METRICS_NAMESPACE: MarketLens
    Layers:
      - !Sub arn:aws:lambda:${AWS::Region}:017000801446:layer:AWSLambdaPowertoolsPythonV3-python313-x86_64:18
  Api:
    TracingEnabled: true

Resources:
  # ─── Cognito: User Pool + Identity Providers ───
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub marketlens-users-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      # MFA is OFF — authentication is handled by custom challenge (email OTP).
      # The OTP itself serves as the second factor (possession of email).
      MfaConfiguration: "OFF"
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          # Password is set to a random value on signup (user never sees it).
          # Custom auth flow bypasses password entirely.
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      DeviceConfiguration:
        ChallengeRequiredOnNewDevice: false
        DeviceOnlyRememberedOnUserPrompt: true
      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT
      LambdaConfig:
        DefineAuthChallenge: !GetAtt AuthDefineFunction.Arn
        CreateAuthChallenge: !GetAtt AuthCreateFunction.Arn
        VerifyAuthChallengeResponse: !GetAtt AuthVerifyFunction.Arn

  # Cognito domain managed outside CloudFormation — see deploy instructions
  # Domain: auth.plinths.net (custom domain with ACM cert)

  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email
        name: name
        username: sub

  # GitHub SSO requires a Lambda-backed OIDC proxy because GitHub does not
  # expose a standard OIDC issuer for user login. Deferred to post-beta.
  # See docs/BACKLOG.md for implementation plan.

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - GoogleIdentityProvider
    Properties:
      ClientName: !Sub marketlens-app-${Stage}
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      # Callback/logout URLs use the CognitoCallbackDomain parameter.
      # First deploy uses "localhost" (placeholder). After deploy, set the
      # parameter to the real CloudFront domain and redeploy.
      CallbackURLs:
        - !Sub "https://${CognitoCallbackDomain}/auth/callback"
      LogoutURLs:
        - !Sub "https://${CognitoCallbackDomain}/"
      SupportedIdentityProviders:
        - Google
      ExplicitAuthFlows:
        - ALLOW_CUSTOM_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED

  # ─── S3: Frontend Hosting ───
  WebUIBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub marketlens-frontend-${Stage}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  WebUIBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebUIBucket
      PolicyDocument:
        Statement:
          - Sid: HttpsOnly
            Action: "*"
            Effect: Deny
            Resource:
              - !Sub arn:${AWS::Partition}:s3:::${WebUIBucket}
              - !Sub arn:${AWS::Partition}:s3:::${WebUIBucket}/*
            Principal: "*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
          - Sid: CloudFrontOriginOnly
            Action: s3:GetObject
            Effect: Allow
            Resource: !Sub arn:${AWS::Partition}:s3:::${WebUIBucket}/*
            Principal:
              Service: "cloudfront.amazonaws.com"
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ─── CloudFront ───
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub marketlens-oac-${Stage}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub marketlens-security-headers-${Stage}
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Override: true
            Preload: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          XSSProtection:
            ModeBlock: true
            Override: true
            Protection: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  # Cookie forwarding policy for /api/* and /auth/* paths
  CookieForwardingCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub marketlens-cookie-cache-${Stage}
        DefaultTTL: 0
        MaxTTL: 0
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingGzip: false

  CookieForwardingOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub marketlens-cookie-origin-${Stage}
        CookiesConfig:
          CookieBehavior: whitelist
          Cookies:
            - ml_access
            - ml_refresh
            - ml_logged_in
            - ml_oauth_state
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Accept
            - Content-Type
            - Origin
            - Referer
        QueryStringsConfig:
          QueryStringBehavior: all

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3
            DomainName: !GetAtt WebUIBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}
          - Id: api
            DomainName: !Sub "${ApiGatewayApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: !Sub "/${Stage}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: x-api-key
                HeaderValue: !Ref ApiKeyValue
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        Aliases:
          - plinths.net
        ViewerCertificate:
          AcmCertificateArn: arn:aws:acm:us-east-1:562559071105:certificate/c1e3758e-5666-4b68-af80-ec658ce11bd4
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            Cookies:
              Forward: none
            QueryString: true
          TargetOriginId: S3
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
        CacheBehaviors:
          # /auth/* — BFF auth endpoints (cookie forwarding, no caching)
          - AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [HEAD, GET, OPTIONS]
            Compress: false
            PathPattern: "/auth/*"
            TargetOriginId: api
            CachePolicyId: !Ref CookieForwardingCachePolicy
            OriginRequestPolicyId: !Ref CookieForwardingOriginRequestPolicy
            ViewerProtocolPolicy: redirect-to-https
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          # /api/* — API endpoints (cookie forwarding for auth)
          - AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [HEAD, GET, OPTIONS]
            Compress: false
            PathPattern: "/api/*"
            TargetOriginId: api
            CachePolicyId: !Ref CookieForwardingCachePolicy
            OriginRequestPolicyId: !Ref CookieForwardingOriginRequestPolicy
            ViewerProtocolPolicy: redirect-to-https
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ─── API Gateway ───
  ApiGatewayApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Auth:
        ApiKeyRequired: true
        DefaultAuthorizer: CookieAuthorizer
        Authorizers:
          CookieAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - Cookie
              ReauthorizeEvery: 300
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGWLogGroup.Arn
        Format: "$context.identity.sourceIp $context.requestTime $context.httpMethod $context.resourcePath $context.protocol $context.status $context.responseLength $context.requestId $context.identity.apiKeyId"
      Cors:
        AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
        AllowHeaders: "'Content-Type,X-Amz-Date,X-Amz-Security-Token,Authorization,X-Api-Key,X-Requested-With,Accept,Cookie'"
        # CORS origin is enforced by CloudFront; API Gateway uses permissive origin
        # to avoid circular dependency (CF domain not known at API creation time).
        # The API key + cookie auth provide the real access control.
        AllowOrigin: "'*'"
        AllowCredentials: false

  # API key with explicit value so CloudFront can inject it as an origin header.
  # The key never reaches the browser — CloudFront adds it server-side.
  MarketLensApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub marketlens-cf-key-${Stage}
      Description: API key injected by CloudFront origin header (never exposed to browser)
      Enabled: true
      Value: !Ref ApiKeyValue
      StageKeys:
        - RestApiId: !Ref ApiGatewayApi
          StageName: !Ref Stage

  MarketLensUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub marketlens-plan-${Stage}
      Description: !Sub "MarketLens ${Stage} — rate limits and quotas"
      ApiStages:
        - ApiId: !Ref ApiGatewayApi
          Stage: !Ref Stage
      Throttle:
        BurstLimit: 20
        RateLimit: 10
      Quota:
        Limit: 500
        Period: DAY

  MarketLensUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MarketLensApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MarketLensUsagePlan

  ApiGWLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/marketlens-${Stage}
      RetentionInDays: 90

  # ─── DynamoDB: Reports Table ───
  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub marketlens-reports-${Stage}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ─── Lambda: Cognito Auth Triggers (passwordless email OTP) ───
  AuthDefineFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/auth-define/
      Description: Cognito DefineAuthChallenge — controls custom auth flow
      MemorySize: 128
      Timeout: 5
      # Override Globals to remove REPORTS_TABLE dependency (not needed by triggers)
      Environment:
        Variables:
          STAGE: !Ref Stage
          POWERTOOLS_SERVICE_NAME: MarketLens
          POWERTOOLS_METRICS_NAMESPACE: MarketLens

  AuthDefineFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthDefineFunction}
      RetentionInDays: 90

  AuthDefinePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthDefineFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  AuthCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/auth-create/
      Description: Cognito CreateAuthChallenge — generates OTP and sends via SES
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          STAGE: !Ref Stage
          SENDER_EMAIL: !Ref SenderEmail
          POWERTOOLS_SERVICE_NAME: MarketLens
          POWERTOOLS_METRICS_NAMESPACE: MarketLens
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
              Condition:
                StringEquals:
                  "ses:FromAddress": !Ref SenderEmail

  AuthCreateFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthCreateFunction}
      RetentionInDays: 90

  AuthCreatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthCreateFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  AuthVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/auth-verify/
      Description: Cognito VerifyAuthChallengeResponse — checks OTP answer
      MemorySize: 128
      Timeout: 5
      Environment:
        Variables:
          STAGE: !Ref Stage
          POWERTOOLS_SERVICE_NAME: MarketLens
          POWERTOOLS_METRICS_NAMESPACE: MarketLens

  AuthVerifyFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthVerifyFunction}
      RetentionInDays: 90

  AuthVerifyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthVerifyFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  # ─── Lambda: BFF Auth ───
  BffAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/bff/
      Description: BFF auth endpoints — login, callback, refresh, logout, me
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:RevokeToken
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
                - cognito-idp:SignUp
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminConfirmSignUp
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/marketlens/${Stage}/cognito-client-secret
      Environment:
        Variables:
          COGNITO_DOMAIN: auth.plinths.net
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          # Secret is in SSM SecureString — not stored as a plaintext env var.
          # After first deploy, populate with:
          #   aws ssm put-parameter \
          #     --name /marketlens/<stage>/cognito-client-secret \
          #     --type SecureString \
          #     --value $(aws cognito-idp describe-user-pool-client \
          #                --user-pool-id <pool-id> --client-id <client-id> \
          #                --query UserPoolClient.ClientSecret --output text)
          COGNITO_CLIENT_SECRET_PARAM: !Sub /marketlens/${Stage}/cognito-client-secret
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          APP_DOMAIN: !Sub "https://${CognitoCallbackDomain}"
      Events:
        AuthAny:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY
            RestApiId: !Ref ApiGatewayApi
            Auth:
              ApiKeyRequired: true
              Authorizer: NONE

  BffAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${BffAuthFunction}
      RetentionInDays: 90

  # ─── Lambda: Authorizer ───
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/authorizer/
      Description: Cookie-based JWT authorizer — validates ml_access cookie
      MemorySize: 256
      Timeout: 10
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReportsTable
      Environment:
        Variables:
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool

  AuthorizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthorizerFunction}
      RetentionInDays: 90

  # ─── Lambda: API ───
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/api/
      Description: REST API handler for MarketLens
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref AiOrchestrationFunction
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub ${AiOrchestrationFunction.Arn}:*
      Environment:
        Variables:
          AI_FUNCTION_NAME: !Sub ${AiOrchestrationFunction.Arn}:live
      Events:
        AnyPath:
          Type: Api
          Properties:
            Path: /api/{proxy+}
            Method: ANY
            RestApiId: !Ref ApiGatewayApi
        HealthCheck:
          Type: Api
          Properties:
            Path: /api/health
            Method: GET
            RestApiId: !Ref ApiGatewayApi
            Auth:
              ApiKeyRequired: false
              Authorizer: NONE

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiFunction}
      RetentionInDays: 90

  # ─── Lambda: AI Orchestration (Durable Function) ───
  AiOrchestrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: infrastructure/lambda/ai-orchestration/
      Description: AI analysis pipeline using Lambda Durable Functions
      MemorySize: 1024
      Timeout: 900
      DurableConfig:
        ExecutionTimeout: 3600
        RetentionPeriodInDays: 7
      AutoPublishAlias: live
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:marketlens/${Stage}/*
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelIdParse}"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelIdAnalyse}"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelIdSummarise}"
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/marketlens/${Stage}/brave-search-api-key"
      Environment:
        Variables:
          BEDROCK_MODEL_ID_PARSE: !Ref BedrockModelIdParse
          BEDROCK_MODEL_ID_ANALYSE: !Ref BedrockModelIdAnalyse
          BEDROCK_MODEL_ID_SUMMARISE: !Ref BedrockModelIdSummarise
          BRAVE_SEARCH_API_KEY_PARAM: !Sub /marketlens/${Stage}/brave-search-api-key

  AiOrchestrationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AiOrchestrationFunction}
      RetentionInDays: 90

  # ─── Lambda: Export ───
  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/export/
      Description: PDF and CSV report export
      MemorySize: 1024
      Timeout: 120
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReportsTable
        - S3CrudPolicy:
            BucketName: !Ref ExportsBucket
      Environment:
        Variables:
          EXPORTS_BUCKET: !Ref ExportsBucket
      Events:
        ExportApi:
          Type: Api
          Properties:
            Path: /api/reports/{report_id}/export
            Method: POST
            RestApiId: !Ref ApiGatewayApi

  ExportFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ExportFunction}
      RetentionInDays: 90

  # ─── S3: Exports Bucket ───
  ExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub marketlens-exports-${Stage}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireExports
            Status: Enabled
            ExpirationInDays: 7

  # ─── Lambda: Billing (Stripe) ───
  BillingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: infrastructure/lambda/billing/
      Description: Stripe billing — checkout, portal, webhooks
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTable
        - SSMParameterReadPolicy:
            ParameterName: !Sub marketlens/${Stage}/stripe-secret-key
        - SSMParameterReadPolicy:
            ParameterName: !Sub marketlens/${Stage}/stripe-webhook-secret
      Environment:
        Variables:
          APP_DOMAIN: !Sub https://${CognitoCallbackDomain}
          STRIPE_SECRET_KEY_PARAM: !Sub /marketlens/${Stage}/stripe-secret-key
          STRIPE_WEBHOOK_SECRET_PARAM: !Sub /marketlens/${Stage}/stripe-webhook-secret
